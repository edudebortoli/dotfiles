################
### MONITORS ###
################

# Standard laptop display + HDMI setups
monitor=eDP-1,1920x1080@60.00,0x0,1.00
#monitor=HDMI-A-1,1920x1080@60.00,1920x0, 1.00
monitor=HDMI-A-1,1920x1080@60.00,1920x0, 1.00

###################
### MY PROGRAMS ###
###################

$terminal = foot
$fileManager = nautilus
$menu = wofi --show drun
$browser = brave-browser-stable 

#################
### AUTOSTART ###
#################

exec-once = nm-applet &
exec-once = waybar & hyprpaper & dunst &
# Set dark mode and themes
exec = gsettings set org.gnome.desktop.interface color-scheme "prefer-dark"
exec = gsettings set org.gnome.desktop.interface gtk-theme "adw-gtk3"

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 6
    gaps_out = 12       # macOS "breathing room"
    border_size = 2     
    
    # Clean glass-style borders
    col.active_border = rgba(ffffff66) 
    col.inactive_border = rgba(00000000)

    layout = dwindle
    resize_on_border = true
    allow_tearing = false
}

decoration {
    rounding = 12       # Smooth Mac corners

    active_opacity = 0.98
    inactive_opacity = 0.92

    # Deep, soft shadows for the "floating" effect
    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = rgba(00000044)
    }

    # Frosted glass effect (Vibrancy)
    blur {
        enabled = true
        special = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = true
        vibrancy = 0.2
    }
}

blurls = waybar

animations {
    enabled = yes

    # The "Apple" Curve: Fast start, long and silky deceleration
    bezier = appleCurve, 0.05, 0.9, 0.1, 1.0

    # Window transitions
    animation = windows, 1, 7, appleCurve, slide
    animation = windowsIn, 1, 7, appleCurve, slide
    animation = windowsOut, 1, 5, appleCurve, slide
    
    # Fade effects
    animation = fade, 1, 5, appleCurve
    animation = fadeIn, 1, 5, appleCurve
    animation = fadeOut, 1, 5, appleCurve

    # Workspace sliding (replicates Mission Control)
    animation = workspaces, 1, 6, appleCurve, slidefade 20%
    
    # Layer/UI transitions
    animation = layers, 1, 5, appleCurve, fade
}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0 
    disable_hyprland_logo = true
    # Smoother window dragging
    animate_mouse_windowdragging = true
}

#############
### INPUT ###
#############

input {
		kb_layout = us,us(intl)
		kb_options = grp:ctrl_space_toggle
    follow_mouse = 1
    sensitivity = 0 

    touchpad {
				natural_scroll = true
        tap-to-click = true
        drag_lock = true
        tap-and-drag = true
    }
}

# Mac-style 3-finger workspace switching
# In newer Hyprland versions, use this syntax:
# Alternative "New" syntax if the above fails:
gestures {
    gesture = 3, horizontal, workspace
}

###################
### KEYBINDINGS ###
###################

$mainMod = SUPER 

# System Actions
bind = $mainMod SHIFT, C, killactive
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, N, exec, $fileManager
bind = $mainMod, V, togglefloating
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod SHIFT, M, exec, ~/.config/hypr/exit_menu.sh
bind = $mainMod SHIFT, escape, exec, hyprlock 

# Browser & Apps
bind = $mainMod SHIFT, B, exec, $browser
# Global Browser Tab Search (Super + F)
# bind = $mainMod, F, exec, hyprctl dispatch focuswindow class:app.zen_browser.zen && hyprctl dispatch sendshortcut ALT, F, activewindow

# Screenshot (Mac-style Shift+Command+S logic)
bind = $mainMod SHIFT, S, exec, mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" - | swappy -f - -o ~/Pictures/Screenshots/screenshot_$(date +'%Y-%m-%d_%H-%M-%S').png

# Toggle a hidden "drawer" for apps (Mac Dashboard style)
bind = $mainMod, TAB, togglespecialworkspace, magic
bind = $mainMod SHIFT, TAB, movetoworkspace, special:magic

# Navigation (Vim keys)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Workspaces (Q-P row)
bind = $mainMod, Q, workspace, 1
bind = $mainMod, W, workspace, 2
bind = $mainMod, E, workspace, 3
bind = $mainMod, R, workspace, 4
bind = $mainMod, T, workspace, 5
bind = $mainMod, Y, workspace, 6
bind = $mainMod, U, workspace, 7
bind = $mainMod, I, workspace, 8
bind = $mainMod, O, workspace, 9
bind = $mainMod, P, workspace, 10

# Move windows to Workspaces
bind = $mainMod SHIFT, Q, movetoworkspace, 1
bind = $mainMod SHIFT, W, movetoworkspace, 2
bind = $mainMod SHIFT, E, movetoworkspace, 3
bind = $mainMod SHIFT, R, movetoworkspace, 4
bind = $mainMod SHIFT, T, movetoworkspace, 5
bind = $mainMod SHIFT, Y, movetoworkspace, 6
bind = $mainMod SHIFT, U, movetoworkspace, 7
bind = $mainMod SHIFT, I, movetoworkspace, 8
bind = $mainMod SHIFT, O, movetoworkspace, 9
bind = $mainMod SHIFT, P, movetoworkspace, 10

# Mouse Binds
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Media Keys
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = suppressevent maximize, class:.*
# Transparency for terminal and file manager to show off the blur
windowrulev2 = opacity 0.9 0.90,class:^($terminal)$
windowrulev2 = opacity 0.95 0.95,class:^($fileManager)$
windowrulev2 = opacity 0.8 0.95,class:^($fileManager)$

# XWayland fix
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0

layerrule = blur, waybar
layerrule = ignorezero, waybar
