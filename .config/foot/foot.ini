# foot.ini configuration

# Font configuration
# Note: Foot uses fontconfig patterns. 
# font_feature -calt -dlig -liga is handled by disabling ligatures
[main]
font=BlexMono Nerd Font:size=10
letter-spacing=0
horizontal-letter-offset=0
vertical-letter-offset=0
# font-features=none
# initial-window-mode=windowed
# background_opacity 0.8
# In foot, this is hex-based (00 to ff). 0.8 is approx cc.
#alpha=0.8
#hide-decorations=yes

[colors]
# Since your kitty config 'includes' a theme, you should 
# paste your Tokyo Night Moon hex codes here.
# Below is a standard Tokyo Night Moon palette for foot:

#background=222436
#foreground=c8d3f5
#regular0=1b1d2b  # black
#regular1=ff757f  # red
#regular2=c3e88d  # green
#regular3=ffc777  # yellow
#regular4=82aaff  # blue
#regular5=c099ff  # magenta
#regular6=86e1fc  # cyan
#regular7=828bb8  # white
#
#bright0=444a73   # bright black
#bright1=ff757f   # bright red
#bright2=c3e88d   # bright green
#bright3=ffc777   # bright yellow
#bright4=82aaff   # bright blue
#bright5=c099ff   # bright magenta
#bright6=86e1fc   # bright cyan
#bright7=c8d3f5   # bright white

[cursor]
style=block
blink=yes
blink-rate=400
# beam-thickness=1.5
# underline-thickness=<font underline thickness>
